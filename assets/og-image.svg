    <rect x="64.79" y="194.38" width="32.4" height="32.4" fill="#00FFCC"/>
    <rect x="97.19" y="194.38" width="32.4" height="32.4" fill="#00FFCC"/>
    <rect x="129.58" y="194.38" width="32.4" height="32.4" fill="#0074FF"/>
